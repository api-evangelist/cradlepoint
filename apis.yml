aid: cradlepoint
name: Cradlepoint
description: >-
  Cradlepoint is a Boise, Idaho-based provider of cloud-managed wireless edge routers, 5G adapters, branch-in-a-box
  appliances, and the NetCloud platform for enterprise wireless WAN (LTE/5G), in-vehicle networks, branch connectivity,
  and IoT. Ericsson acquired Cradlepoint in 2020 (closed November 2020 for approximately US$1.1B) and Cradlepoint now
  operates as the core of Ericsson Enterprise Wireless Solutions, working alongside Ericsson Private 5G and the Ericsson
  NetCloud SASE offering. Cradlepoint exposes its NetCloud Manager (NCM) platform through a documented RESTful API — NCM
  API v2 (Swagger 1.2, paired X-CP-API-ID/X-CP-API-KEY + X-ECM-API-ID/X-ECM-API-KEY headers, base
  https://www.cradlepointecm.com/api/v2/) and a newer NCM API v3 (OpenAPI 3.0, bearer-token authentication) — plus a
  NetCloud Router SDK for on-router Python applications and webhook destinations for alert delivery. The developer area
  (developer.cradlepoint.com), customer support article base (customer.cradlepoint.com), and Ericsson Enterprise
  Wireless docs portal (docs.cradlepoint.com) host the Getting Started guides, API reference, sample collections, and
  Postman bundles.
