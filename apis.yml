apis:
  - aid: cradlepoint:netcloud-manager-api-v2
    name: Cradlepoint NetCloud Manager API v2
    description: >-
      RESTful API for the NetCloud Manager (NCM) platform. Programmatic access to accounts, routers, groups,
      configuration_managers, alerts and alert_rules, alert_push_destinations, activity_logs, locations and
      historical_locations, net_devices, net_device_signal_samples, net_device_usage_samples, net_device_health,
      net_device_metrics, router_alerts, router_lans, router_state_samples, users, subscriptions, and firmware. Base URL
      https://www.cradlepointecm.com/api/v2/. Authentication uses two paired key sets sent as headers on every request —
      X-CP-API-ID / X-CP-API-KEY (account-level Cradlepoint API keys, for usage tracking) and X-ECM-API-ID /
      X-ECM-API-KEY (NCM-tenant API keys generated from the NCM Tools tab; carry the Administrator / Full Access /
      Read-Only / Diagnostic role grants). Supports GET, POST, PUT, PATCH, DELETE; not every method is supported on
      every resource. Documented with Swagger 1.2.
    humanURL: https://customer.cradlepoint.com/s/article/NCM-APIv2-Overview
    baseURL: https://www.cradlepointecm.com/api/v2/
    tags:
      - NetCloud
      - Routers
      - Wireless WAN
      - Edge
      - Cellular
    properties:
      - type: Documentation
        url: https://customer.cradlepoint.com/s/article/NCM-APIv2-Overview
      - type: Documentation
        url: https://docs.cradlepoint.com/r/NCM-APIv2-Overview
      - type: GettingStarted
        url: https://customer.cradlepoint.com/s/article/NetCloud-API-Getting-Started-Guide
      - type: Developer
        url: https://developer.cradlepoint.com/
      - type: OpenAPI
        url: openapi/cradlepoint-netcloud-manager-api-v2-openapi.yml
      - type: Postman
        url: https://developer.cradlepoint.com/documentation/samples
      - type: SampleCode
        url: https://github.com/cradlepoint/api-samples
      - type: JSONSchema
        url: json-schema/cradlepoint-router-schema.json
      - type: JSONSchema
        url: json-schema/cradlepoint-alert-schema.json
      - type: JSONLD
        url: json-ld/cradlepoint-context.jsonld
  - aid: cradlepoint:netcloud-manager-api-v3
    name: Cradlepoint NetCloud Manager API v3
    description: >-
      The next-generation NetCloud Manager API. Documented with OpenAPI 3.0, authenticated with bearer tokens, designed
      for improved performance, stability, and usability over API v2. Coexists with v2 during a multi-year transition
      window; v3 covers core router, device, alert, group, and account operations.
    humanURL: https://customer.cradlepoint.com/s/article/NetCloud-Manager-API-v3
    tags:
      - NetCloud
      - Routers
      - 5G
    properties:
      - type: Documentation
        url: https://customer.cradlepoint.com/s/article/NetCloud-Manager-API-v3
      - type: Developer
        url: https://developer.cradlepoint.com/
      - type: SampleCode
        url: https://github.com/cradlepoint/api-samples
  - aid: cradlepoint:netcloud-webhooks
    name: Cradlepoint NetCloud Alert Webhooks
    description: >-
      Outbound HTTP destinations (alert_push_destinations) configured via the NCM API or UI to receive real-time JSON
      alert payloads when NCM alert rules fire (router offline, signal degradation, configuration change, subscription
      expiration, threshold breach). Each destination is a URL + optional auth headers; payload includes account,
      router, alert type, timestamp, and contextual metadata.
    humanURL: https://developer.cradlepoint.com/documentation/webhooks
    tags:
      - Webhooks
      - Events
      - Alerts
    properties:
      - type: Documentation
        url: https://developer.cradlepoint.com/documentation/webhooks
      - type: Documentation
        url: https://customer.cradlepoint.com/s/article/NCM-APIv2-Overview
  - aid: cradlepoint:netcloud-router-sdk
    name: Cradlepoint NetCloud Router SDK
    description: >-
      On-router Python SDK and toolchain (the "SDK" / "Router SDK") for building and deploying custom applications onto
      Cradlepoint routers running NetCloud OS. Lets developers write Python apps that read router configuration, GPIO,
      GPS, modem signal, and connection state, and that can be packaged and deployed across a fleet via NCM. Sample apps
      in cradlepoint/sdk-samples cover GPS forwarding, modem diagnostics, serial passthrough, MQTT publishing, and more.
    humanURL: https://github.com/cradlepoint/sdk-samples
    tags:
      - SDK
      - Edge
      - Python
      - Routers
    properties:
      - type: SDKs
        url: https://github.com/cradlepoint/sdk-samples
      - type: Documentation
        url: https://customer.cradlepoint.com/s/article/NCOS-Router-SDK-Developers-Guide
      - type: Language
        url: https://www.python.org/
